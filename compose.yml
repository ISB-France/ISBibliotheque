services:
  db:
    image: postgres:16-alpine
    ports:
      - "5438:5432"
    environment:
      POSTGRES_DB: isbibliotheque_recette
      POSTGRES_USER: isb
      POSTGRES_PASSWORD: isb-dev-password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isb -d isbibliotheque_recette"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.prod
    ports:
      - "3006:4000"
    volumes:
      - ./infra:/app/infra
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=4000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.prod
      args:
        VITE_APP_URL: https://recette.isbibliotheque.groupe-isb.fr
        VITE_API_URL: https://recette.isbibliotheque.groupe-isb.fr/api
        VITE_APP_ENV: staging
        VITE_APP_TITLE: ISBibliotheque (Recette)
    ports:
      - "5174:80"
    depends_on:
      - backend
    networks:
      - internal
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.isbibliotheque-recette.rule=Host(`recette.isbibliotheque.groupe-isb.fr`)"
      - "traefik.http.routers.isbibliotheque-recette.entryPoints=http"
      - "traefik.http.services.isbibliotheque-recette.loadbalancer.server.port=80"

networks:
  internal:
    driver: bridge
  coolify:
    external: true

volumes:
  pgdata:
