services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: isbibliotheque
      POSTGRES_USER: isb
      POSTGRES_PASSWORD: isb-dev-password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isb -d isbibliotheque"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "3006:4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra:/app/infra
      - ./apps/backend/src:/app/apps/backend/src
      - ./apps/backend/prisma:/app/apps/backend/prisma
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=4000
      - LOG_LEVEL=debug
      - CORS_ORIGIN=http://localhost:5176
      - APP_URL=http://localhost:5176
      - OIDC_REDIRECT_URI=http://localhost:3006/api/auth/callback
      - CHOKIDAR_USEPOLLING=1
    depends_on:
      db:
        condition: service_healthy

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "5176:5173"
    volumes:
      - ./apps/frontend/src:/app/apps/frontend/src
    depends_on:
      - backend
    environment:
      - VITE_API_PROXY_TARGET=http://backend:4000

volumes:
  pgdata:
