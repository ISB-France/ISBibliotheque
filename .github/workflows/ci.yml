name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: 10.10.0

jobs:
  lint-and-typecheck:
    name: Lint & TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm --filter @isbibliotheque/backend prisma validate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Generate Prisma client
        run: pnpm --filter @isbibliotheque/backend prisma:generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: TypeScript — backend
        run: pnpm --filter @isbibliotheque/backend typecheck

      - name: TypeScript — frontend
        run: pnpm --filter @isbibliotheque/frontend typecheck

      - name: Build — backend
        run: pnpm --filter @isbibliotheque/backend build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Build — frontend
        run: pnpm --filter @isbibliotheque/frontend build

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: false
          tags: isbibliotheque/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: false
          tags: isbibliotheque/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
