name: CI

on:
  push:
    branches: [dev, recette, main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: true
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check

  backend:
    name: Backend — typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: true
      - name: Prisma generate
        run: pnpm --filter @isbibliotheque/backend prisma:generate
      - name: Typecheck
        run: pnpm --filter @isbibliotheque/backend typecheck
      - name: Build
        run: pnpm --filter @isbibliotheque/backend build

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: true
      - name: Typecheck
        run: pnpm --filter @isbibliotheque/frontend typecheck
      - name: Build
        run: pnpm --filter @isbibliotheque/frontend build
