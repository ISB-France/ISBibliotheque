version: '3.8'

services:
  portail:
    build: .
    container_name: isb-portail
    ports:
      - "80:80"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - isb-network

networks:
  isb-network:
    driver: bridge

